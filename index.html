<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVD Cost Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>AVD Cost Calculator</h1>

    <section class="config">
      <label for="location">Location:</label>
      <select id="location">
        <option value="australia-east">Australia East</option>
        <option value="australia-southeast">Australia Southeast</option>
      </select>

      <label for="vm-search">Search VM:</label>
      <input type="text" id="vm-search" placeholder="e.g. D4s" />
      <select id="vm-type"></select>

      <label for="fslogix">FSLogix Size (GB):</label>
      <input type="range" id="fslogix" min="0" max="100" step="5" value="30" />
      <span id="fslogix-value">30 GB</span>
      <label><input type="checkbox" id="fslogix-toggle" checked /> Include FSLogix</label>

      <label for="osdisk">OS Disk Size (GB):</label>
      <input type="range" id="osdisk" min="64" max="512" step="32" value="128" />
      <span id="osdisk-value">128 GB</span>

      <label for="hours">Usage Hours:</label>
      <select id="hours">
        <option value="730">730 hrs/month</option>
        <option value="184">8 hrs/day × 23 days</option>
        <option value="200">Include weekends</option>
      </select>

      <label><input type="checkbox" id="nat-toggle" checked /> Include NAT Gateway</label>
      <label><input type="checkbox" id="law-toggle" /> Include Log Analytics Workspace</label>
      <label><input type="checkbox" id="mgmt-toggle" /> Include Management Server</label>
      <label><input type="checkbox" id="golden-toggle" /> Include Golden Image VM</label>

      <label for="session-hosts">Number of AVD Session Hosts:</label>
      <input type="number" id="session-hosts" min="1" value="10" />
    </section>

    <section class="results">
      <canvas id="costChart" width="400" height="200"></canvas>
      <table id="cost-table"></table>
      <button id="download-csv">Download CSV</button>
      <button id="download-pdf">Download PDF</button>
      <p class="disclaimer">* Prices are estimates in AUD and may vary due to currency conversion (7–9% buffer included).</p>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
