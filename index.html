<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVD Cost Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>AVD Cost Calculator</h1>
    <div id="topTotalCost" class="total-cost-display">Total Monthly Cost: $0 AUD</div>
  </header>

  <main>
    <form id="costForm">
      <section class="input-group">
        <label for="vmSize">Select VM Size:</label>
        <select id="vmSize">
          <option value="D2s_v3">D2s_v3 (2 vCPU, 8 GB RAM)</option>
          <option value="D4s_v3">D4s_v3 (4 vCPU, 16 GB RAM)</option>
          <option value="D8s_v3">D8s_v3 (8 vCPU, 32 GB RAM)</option>
          <option value="B2ms">B2ms (2 vCPU, 8 GB RAM)</option>
          <option value="B4ms">B4ms (4 vCPU, 16 GB RAM)</option>
        </select>

        <label for="sessionHosts">Number of Session Hosts:</label>
        <input type="number" id="sessionHosts" value="2" min="1" />
      </section>

      <section class="input-group">
        <label><input type="checkbox" id="natGateway" /> Include NAT Gateway</label>
        <label><input type="checkbox" id="law" /> Include Log Analytics Workspace</label>
        <label><input type="checkbox" id="mgmtServer" /> Include Management Server (B4ms)</label>
        <label><input type="checkbox" id="goldenImage" /> Include Golden Image Server (B4ms)</label>
        <label><input type="checkbox" id="m365License" /> Include Microsoft 365 Business Standard License</label>
        <label for="userCount">Number of AVD Users:</label>
        <input type="number" id="userCount" value="10" min="1" />
      </section>

      <button type="button" onclick="calculateCost()">Calculate</button>
    </form>

    <div id="chartContainer">
      <canvas id="costChart"></canvas>
      <div id="chartTotalCost" class="total-cost-display">Total Monthly Cost: $0 AUD</div>
    </div>

    <div id="breakdownTable"></div>
  </main>

  <footer>
    <p>Disclaimer: VM prices include Windows license. All costs are estimates in AUD.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
